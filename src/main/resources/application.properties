spring.application.name=codeit-earthquake

# temporary H2 Database configuration
spring.datasource.url=jdbc:h2:mem:earthquakedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Web Console (Optional: Go to http://localhost:8080/h2-console to view the db)
spring.h2.console.enabled=true
